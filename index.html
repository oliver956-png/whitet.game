<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withet | Blooks Estáveis</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1976d2;
            --sidebar-bg: #ffffff;
            --content-bg: #f0f2f5;
            --token-color: #f1c40f;
            --equipped-color: #2ecc71;
            --bg-gradient: linear-gradient(-45deg, #1e3799, #0c2461, #4a69bd, #079992);
        }

        * { box-sizing: border-box; transition: all 0.2s ease; font-family: 'Nunito', sans-serif; }
        body { margin: 0; background: var(--bg-gradient); background-size: 400% 400%; animation: gradientBG 15s ease infinite; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        #auth-screen { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 15px 0 rgba(0,0,0,0.2); width: 360px; text-align: center; }
        #game-screen { width: 95%; height: 90vh; background: var(--content-bg); border-radius: 30px; display: none; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        .active-flex { display: flex !important; }
        .hidden { display: none !important; }

        /* SIDEBAR */
        .sidebar { width: 240px; background: var(--sidebar-bg); height: 100%; display: flex; flex-direction: column; padding: 15px; border-right: 4px solid #ddd; flex-shrink: 0; }
        .nav-item { padding: 12px 15px; margin: 4px 0; border-radius: 12px; cursor: pointer; font-weight: bold; color: #636e72; }
        .nav-item.active { background: var(--primary); color: white; box-shadow: 0 4px 0 #0d47a1; }

        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .tab-body { flex: 1; padding: 30px; overflow-y: auto; }

        /* DESIGN DO BLOOK (CÓDIGO PURO) */
        .blook-box { 
            width: 80px; height: 100px; border-radius: 12px; margin: 10px auto; position: relative; 
            box-shadow: inset 0 -8px 0 rgba(0,0,0,0.15); display: flex; align-items: center; justify-content: center;
        }
        .eye { position: absolute; width: 12px; height: 12px; background: #222; border-radius: 50%; top: 30px; }
        .eye.l { left: 18px; } .eye.r { right: 18px; }
        .mouth { position: absolute; width: 16px; height: 4px; background: #222; border-radius: 10px; bottom: 25px; }

        /* PITAYA DETALHES */
        .pitaya-leaf { position: absolute; width: 20px; height: 25px; background: #4caf50; border-radius: 50% 50% 0 0; top: -15px; z-index: -1; }
        .leaf-1 { left: 15px; transform: rotate(-20deg); }
        .leaf-2 { right: 15px; transform: rotate(20deg); }

        .orange { background: #ff9800; }
        .lemon { background: #cddc39; }
        .strawberry { background: #ff5252; }
        .pitaya { background: #e91e63; }

        /* CARDS */
        .blook-card { background: white; border-radius: 15px; padding: 10px; text-align: center; box-shadow: 0 5px 0 #ddd; border: 3px solid transparent; }
        .is-equipped { border-color: var(--equipped-color); background: #f0fff4; }

        .btn-action { margin-top: 5px; padding: 6px; width: 100%; border: none; border-radius: 8px; font-weight: 900; cursor: pointer; color: white; font-size: 0.7rem; }
        
        /* UNBOXING */
        #unboxing-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 1000; cursor: pointer; }
        #anim-box { font-size: 8rem; animation: shake 0.5s infinite; }
        @keyframes shake { 0%, 100% { transform: rotate(0); } 25% { transform: rotate(10deg); } 75% { transform: rotate(-10deg); } }

        .btn { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; box-shadow: 0 5px 0 #0d47a1; margin-top: 10px; }
        .friend-item { background: white; padding: 12px; border-radius: 12px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 3px 0 #ddd; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <h1>WITHET</h1>
        <h2 id="auth-title">LOGIN</h2>
        <input type="text" id="user" placeholder="USUÁRIO" style="width:100%; padding:10px; margin:5px 0; border:2px solid #eee; border-radius:8px;">
        <input type="password" id="pass" placeholder="SENHA" style="width:100%; padding:10px; margin:5px 0; border:2px solid #eee; border-radius:8px;">
        <button class="btn" onclick="handleAuth()">ENTRAR</button>
        <p onclick="toggleAuthMode()" style="cursor:pointer; font-size:0.9rem; margin-top:10px;">Criar conta</p>
    </div>

    <div id="game-screen">
        <div class="sidebar">
            <h2 style="color:var(--primary); text-align:center;">WITHET</h2>
            <div class="nav-item active" onclick="switchTab('news', this)">Notícias</div>
            <div class="nav-item" onclick="switchTab('shop', this)">Loja</div>
            <div class="nav-item" onclick="switchTab('blooks', this)">Blooks</div>
            <div class="nav-item" onclick="switchTab('friends', this)">Amigos</div>
            <div style="margin-top:auto;" class="nav-item" onclick="logout()">Sair</div>
        </div>

        <div class="main-content">
            <div style="padding:15px; text-align:right; font-weight:900; color:var(--token-color);">
                🟡 <span id="coins">0</span>
            </div>
            <div class="tab-body">
                <div id="tab-news"><h1>Novidades</h1><p>Blooks 100% carregáveis e sistema de amigos ativo!</p></div>
                <div id="tab-shop" class="hidden">
                    <h1>Loja</h1>
                    <div onclick="openBox()" style="background:white; padding:30px; border-radius:20px; text-align:center; cursor:pointer; width:200px; box-shadow:0 8px 0 #ddd;">
                        <div style="font-size:4rem;">📦</div>
                        <h3>Fruit Box</h3>
                        <div style="color:var(--token-color); font-weight:bold;">15 Tokens</div>
                    </div>
                </div>
                <div id="tab-blooks" class="hidden">
                    <h1>Sua Coleção</h1>
                    <div id="inv-grid" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(130px, 1fr)); gap:15px;"></div>
                </div>
                <div id="tab-friends" class="hidden">
                    <div style="display:flex; justify-content:space-between;">
                        <h1>Amigos</h1>
                        <div>
                            <button class="btn" style="width:80px; font-size:0.6rem; margin:0;" onclick="toggleFriendsTab('list')">Lista</button>
                            <button class="btn" style="width:80px; font-size:0.6rem; margin:0; background:#e67e22;" onclick="toggleFriendsTab('req')">Pedidos</button>
                        </div>
                    </div>
                    <div id="f-list">
                        <input type="text" id="f-name" placeholder="Nome...">
                        <button class="btn" onclick="addFriend()">Adicionar</button>
                        <div id="f-container" style="margin-top:15px;"></div>
                    </div>
                    <div id="f-req" class="hidden"><div id="r-container"></div></div>
                </div>
            </div>
        </div>
    </div>

    <div id="unboxing-overlay" onclick="this.style.display='none'; updateInv();">
        <div id="anim-box">📦</div>
        <div id="anim-res" style="display:none; text-align:center; color:white;">
            <div id="won-blook"></div>
            <h1 id="won-name"></h1>
        </div>
    </div>

    <script>
        let user = "";
        const blooks = {
            orange: { n: 'Orange', c: 'orange', v: 5 },
            lemon: { n: 'Lemon', c: 'lemon', v: 5 },
            strawberry: { n: 'Strawberry', c: 'strawberry', v: 15 },
            pitaya: { n: 'Dragonfruit', c: 'pitaya', v: 100 }
        };

        function getBlook(id) {
            return `
            <div class="blook-box ${blooks[id].c}">
                ${id === 'pitaya' ? '<div class="pitaya-leaf leaf-1"></div><div class="pitaya-leaf leaf-2"></div>' : ''}
                <div class="eye l"></div><div class="eye r"></div><div class="mouth"></div>
            </div>`;
        }

        function handleAuth() {
            const u = document.getElementById('user').value.toLowerCase();
            const p = document.getElementById('pass').value;
            if(!u || !p) return;
            if(document.getElementById('auth-title').innerText === "LOGIN") {
                if(localStorage.getItem(`u_${u}`) === p) { user = u; start(); } else alert("Erro!");
            } else {
                localStorage.setItem(`u_${u}`, p);
                localStorage.setItem(`c_${u}`, 200);
                localStorage.setItem(`b_${u}`, "[]");
                localStorage.setItem(`r_${u}`, "[]");
                localStorage.setItem(`f_${u}`, "[]");
                alert("Criado!"); toggleAuthMode();
            }
        }

        function start() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('game-screen').classList.add('active-flex');
            updateCoins(); updateInv(); updateFriends();
        }

        function updateCoins() { document.getElementById('coins').innerText = localStorage.getItem(`c_${user}`); }

        function updateInv() {
            const my = JSON.parse(localStorage.getItem(`b_${user}`) || "[]");
            const eq = localStorage.getItem(`e_${user}`);
            document.getElementById('inv-grid').innerHTML = my.map((id, i) => `
                <div class="blook-card ${eq == i ? 'is-equipped' : ''}">
                    ${getBlook(id)}
                    <b>${blooks[id].n}</b>
                    <button class="btn-action" style="background:var(--primary);" onclick="equip(${i})">${eq == i ? 'EQUIPADO' : 'EQUIPAR'}</button>
                    <button class="btn-action" style="background:#ff7675;" onclick="sell(${i})">VENDER</button>
                </div>`).join('');
        }

        function equip(i) { localStorage.setItem(`e_${user}`, i); updateInv(); }

        function sell(i) {
            let my = JSON.parse(localStorage.getItem(`b_${user}`));
            let c = parseInt(localStorage.getItem(`c_${user}`));
            c += blooks[my[i]].v;
            my.splice(i, 1);
            localStorage.setItem(`b_${user}`, JSON.stringify(my));
            localStorage.setItem(`c_${user}`, c);
            updateCoins(); updateInv();
        }

        function openBox() {
            let c = parseInt(localStorage.getItem(`c_${user}`));
            if(c < 15) return alert("Sem tokens!");
            c -= 15; localStorage.setItem(`c_${user}`, c); updateCoins();
            const ids = Object.keys(blooks);
            const won = ids[Math.floor(Math.random() * ids.length)];
            let my = JSON.parse(localStorage.getItem(`b_${user}`));
            my.push(won); localStorage.setItem(`b_${user}`, JSON.stringify(my));
            
            document.getElementById('unboxing-overlay').style.display='flex';
            document.getElementById('anim-box').style.display='block';
            document.getElementById('anim-res').style.display='none';
            setTimeout(() => {
                document.getElementById('anim-box').style.display='none';
                document.getElementById('won-blook').innerHTML = getBlook(won);
                document.getElementById('won-name').innerText = blooks[won].n;
                document.getElementById('anim-res').style.display='block';
            }, 1200);
        }

        function updateFriends() {
            const reqs = JSON.parse(localStorage.getItem(`r_${user}`) || "[]");
            const list = JSON.parse(localStorage.getItem(`f_${user}`) || "[]");
            document.getElementById('r-container').innerHTML = reqs.map((r, i) => `
                <div class="friend-item"><span>${r}</span>
                <div><button onclick="acceptF(${i})" style="background:green; color:white; border:none; padding:5px; border-radius:5px;">Sim</button>
                <button onclick="rejectF(${i})" style="background:red; color:white; border:none; padding:5px; border-radius:5px;">Não</button></div></div>`).join('');
            document.getElementById('f-container').innerHTML = list.map(l => `<div class="friend-item">🟢 ${l}</div>`).join('');
        }

        function addFriend() {
            const t = document.getElementById('f-name').value.toLowerCase();
            if(!t || t === user || !localStorage.getItem(`u_${t}`)) return alert("Erro!");
            let r = JSON.parse(localStorage.getItem(`r_${t}`) || "[]");
            if(!r.includes(user)) r.push(user);
            localStorage.setItem(`r_${t}`, JSON.stringify(r));
            alert("Enviado!");
        }

        function acceptF(i) {
            let r = JSON.parse(localStorage.getItem(`r_${user}`));
            let f = JSON.parse(localStorage.getItem(`f_${user}`));
            const other = r[i];
            f.push(other); r.splice(i, 1);
            localStorage.setItem(`f_${user}`, JSON.stringify(f));
            localStorage.setItem(`r_${user}`, JSON.stringify(r));
            let of = JSON.parse(localStorage.getItem(`f_${other}`) || "[]");
            of.push(user); localStorage.setItem(`f_${other}`, JSON.stringify(of));
            updateFriends();
        }

        function rejectF(i) {
            let r = JSON.parse(localStorage.getItem(`r_${user}`));
            r.splice(i, 1); localStorage.setItem(`r_${user}`, JSON.stringify(r));
            updateFriends();
        }

        function switchTab(t, el) {
            ['news', 'shop', 'blooks', 'friends'].forEach(id => document.getElementById(`tab-${id}`).classList.add('hidden'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(`tab-${t}`).classList.remove('hidden');
            el.classList.add('active');
        }

        function toggleFriendsTab(t) {
            document.getElementById('f-list').classList.toggle('hidden', t !== 'list');
            document.getElementById('f-req').classList.toggle('hidden', t !== 'req');
        }

        function toggleAuthMode() {
            const t = document.getElementById('auth-title');
            t.innerText = t.innerText === "LOGIN" ? "CADASTRO" : "LOGIN";
        }

        function logout() { user = ""; location.reload(); }
    </script>
</body>
</html>
